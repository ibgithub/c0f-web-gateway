home.pricing.item1=Minimal kontrak 4 bulan
home.pricing.item2=Kasir Web & Android
home.pricing.item3=Printer thermal sebagai fasilitas pinjam pakai
home.pricing.item4=Instalasi & setup awal dibantu
home.pricing.item5=Support WhatsApp
home.pricing.item6=Kertas struk awal (bisa disesuaikan)

home.pricing.note.title=Catatan Paket
home.pricing.note.item1=Printer merupakan fasilitas pinjam pakai selama masa berlangganan.
home.pricing.note.item2=Jika berhenti sebelum masa minimal berakhir, perangkat dapat ditarik kembali.
home.pricing.note.item3=Harga dapat menyesuaikan jumlah outlet, kebutuhan perangkat, dan area instalasi.
home.pricing.note.item4=Cocok untuk tenant yang ingin langsung pakai tanpa ribet setup sendiri.

home.faq.title=Pertanyaan yang Sering Ditanyakan
home.faq.subtitle=Supaya calon tenant lebih mudah memahami sistem sewa Teman-UMKM.

home.faq.q1=Apakah saya harus beli printer sendiri?
home.faq.a1=Tidak. Printer thermal tersedia sebagai fasilitas pinjam pakai selama masa berlangganan, sehingga tenant bisa langsung menggunakan sistem tanpa repot membeli perangkat di awal.

home.faq.q2=Apakah instalasi dan setting awal dibantu?
home.faq.a2=Ya. Instalasi, setup awal, dan pengenalan penggunaan sistem dibantu agar tenant bisa langsung memakai aplikasi dengan lebih nyaman.

home.faq.q3=Minimal berlangganan berapa lama?
home.faq.a3=Minimal masa berlangganan adalah 4 bulan. Hal ini agar biaya perangkat, instalasi, dan support awal tetap masuk akal untuk kedua belah pihak.

home.faq.q4=Kalau berhenti sebelum 4 bulan bagaimana?
home.faq.a4=Karena printer adalah fasilitas pinjam pakai, maka perangkat dapat ditarik kembali apabila tenant berhenti sebelum masa minimal berlangganan berakhir.

home.faq.q5=Cocok untuk usaha seperti apa?
home.faq.a5=Sangat cocok untuk warung makan, pecel lele, nasi goreng, kedai kopi sederhana, angkringan, booth minuman, toko kelontong, dan berbagai UMKM yang ingin sistem kasir praktis tanpa biaya awal yang besar.

home.cta.title=Ingin Coba untuk Usaha Anda?
home.cta.desc=Konsultasi dulu gratis. Cocok untuk Anda yang ingin mencoba sistem kasir modern tanpa repot beli perangkat dan setup sendiri.
