home.problem.item3.desc=Sulit menentukan produk mana yang paling laku dan perlu diprioritaskan.
home.problem.item4.title=Tidak Tahu Margin Terbaik
home.problem.item4.desc=Produk ramai belum tentu paling untung. Perlu data untuk mengambil keputusan.

home.feature.title=Fitur Utama Teman-UMKM
home.feature.subtitle=Dibuat sederhana, cepat dipahami, dan langsung terasa manfaatnya untuk usaha harian.
home.feature.item1.title=Kasir (Web & Android)
home.feature.item1.desc=Proses transaksi lebih cepat dan fleksibel. Bisa digunakan di laptop maupun HP Android.
home.feature.item2.title=Kelola Outlet & Produk
home.feature.item2.desc=Atur outlet, kategori, dan produk yang dijual agar operasional lebih rapi.
home.feature.item3.title=Laporan Penjualan Harian
home.feature.item3.desc=Pantau omzet, produk paling laris, dan produk paling menguntungkan setiap hari.

home.rental.title=Kenapa Sistem Sewa Lebih Praktis?
home.rental.subtitle=UMKM tidak perlu repot beli perangkat dan setup sendiri.
home.rental.item1.title=Modal Awal Lebih Ringan
home.rental.item1.desc=Tidak perlu keluar biaya besar di awal untuk beli perangkat dan setup.
home.rental.item2.title=Printer Disiapkan
home.rental.item2.desc=Printer struk tersedia sebagai fasilitas pinjam pakai selama berlangganan.
home.rental.item3.title=Instalasi Dibantu
home.rental.item3.desc=Sistem dipasang dan disiapkan agar tenant tinggal langsung pakai.
home.rental.item4.title=Support WhatsApp
home.rental.item4.desc=Kalau ada kendala, tenant bisa langsung konsultasi lewat WhatsApp.

