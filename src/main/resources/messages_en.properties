home.problem.item2.desc=Business owners do not know exactly how much they sold today.
home.problem.item3.title=Don't Know Best-Selling Products
home.problem.item3.desc=It is difficult to determine which products sell best and should be prioritized.
home.problem.item4.title=Don't Know Best Profit Margins
home.problem.item4.desc=A popular product is not always the most profitable. Data is needed to make better decisions.

