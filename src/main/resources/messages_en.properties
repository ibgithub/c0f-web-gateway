home.pricing.note.item1=The printer is provided as a lending facility during the subscription period.
home.pricing.note.item2=If the tenant stops before the minimum period ends, the device may be taken back.
home.pricing.note.item3=Pricing may vary depending on the number of outlets, device requirements, and installation area.
home.pricing.note.item4=Suitable for tenants who want to start using the system immediately without complicated setup.

home.faq.title=Frequently Asked Questions
home.faq.subtitle=To help prospective tenants better understand the Teman-UMKM rental system.

home.faq.q1=Do I need to buy my own printer?
home.faq.a1=No. A thermal printer is provided as a lending facility during the subscription period, so tenants can start using the system without needing to buy hardware upfront.

home.faq.q2=Is installation and initial setup included?
home.faq.a2=Yes. Installation, initial setup, and basic usage guidance are provided so tenants can start using the application comfortably.

home.faq.q3=What is the minimum subscription period?
home.faq.a3=The minimum subscription period is 4 months. This ensures that the device, installation, and initial support costs remain reasonable for both parties.

home.faq.q4=What if I stop before 4 months?
home.faq.a4=Because the printer is provided as a lending facility, the device may be taken back if the tenant stops before the minimum subscription period ends.

home.faq.q5=What types of businesses is this suitable for?
home.faq.a5=It is highly suitable for food stalls, pecel lele shops, fried rice stalls, small coffee shops, angkringan, beverage booths, grocery stores, and various MSMEs that want a practical cashier system without high upfront costs.

home.cta.title=Want to Try It for Your Business?
home.cta.desc=Consultation is free. Perfect for those who want to try a modern cashier system without the hassle of buying devices and setting everything up themselves.
