<!doctype html>
<html lang="id"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_layout}">
<head>
    <title class="fw-semibold" th:text="#{outletStaff.title}"></title>
</head>
<body>

<section layout:fragment="content">
    <div class="container pt-1">
        <div th:replace="~{fragments/list-header :: listHeader(
                'outletStaff.title',
                '/outlet-staffs',
                ${pageSize},
                ${keyword},
                ${success}
        )}"></div>

        <!-- Card -->
        <div class="card shadow-sm border-0">
            <div class="card-body rounded-3 pt-2 pb-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="fw-semibold text-secondary" th:text="#{outletStaff.merchantName}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{outletStaff.outletName}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{outletStaff.fullName}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{outletStaff.businessRole}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{status}"></th>
                            <th class="text-end fw-semibold text-secondary" th:text="#{action}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="outletStaff : ${outletStaffs}">
                            <td th:text="${outletStaff.merchantName}"></td>
                            <td th:text="${outletStaff.outletName}"></td>
                            <td th:text="${outletStaff.fullName}"></td>
                            <td th:text="${outletStaff.businessRole}"></td>
                            <td th:text="${outletStaff.status}"></td>
                            <td class="text-end">
                                <div th:replace="~{fragments/table-actions :: tableActions(
                                    '/outlet-staffs/' + ${outletStaff.id},
                                    '/outlet-staffs/' + ${outletStaff.id} + '/edit',
                                    '/outlet-staffs/' + ${outletStaff.id} + '/delete',
                                    ${role == 'ADMIN' or role == 'MERCHANT_USER'},
                                    ${role == 'ADMIN' or role == 'MERCHANT_USER'}
                                    )}">
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div th:replace="~{fragments/list-toolbar :: listToolbar(
                    '/outlet-staffs',
                    ${currentPage},
                    ${totalPages},
                    ${pageSize},
                    ${totalElements},
                    ${role == 'ADMIN' or role == 'MERCHANT_USER'},
                    '/outlet-staffs/add',
                    #{outletStaff.add},
                    ${keyword}
                    )}">
                </div>
            </div>
        </div>
    </div>
</section>

</body>
</html>
