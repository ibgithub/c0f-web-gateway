<!doctype html>
<html lang="id"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_layout}">

<head>
    <title class="fw-semibold" th:text="(${mode == 'view'} ? #{category.detail} :
                             (${mode == 'edit'} ? #{category.edit} :
                              #{category.add}))"></title>
</head>

<body>

<section layout:fragment="content">
    <div class="container py-4">
        <!-- TITLE -->
        <div class="row justify-content-center">
            <h4 class="fw-semibold mb-3"
                th:text="(${mode == 'view'} ? #{product.detail} :
                         (${mode == 'edit'} ? #{product.edit} :
                          #{product.add}))">
            </h4>

            <form th:action="
                            ${mode == 'add'} ?
                                @{/products/add} :
                                @{/products/{id}/edit(id=${product.id})}"
                      th:object="${product}"
                      method="post">

                    <!-- CARD -->
                    <div class="card shadow-sm border-0 detail-card">
                        <div class="row g-4">
                            <!-- ================= LEFT COLUMN ================= -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" th:text="#{product.merchant}"></label>
                                    <!-- Mode Add: pilih merchant -->
                                    <div th:if="${mode == 'add'}">
                                        <select id="merchantSelect" class="form-select"
                                                th:field="*{merchantId}"
                                                th:disabled="${mode == 'view'}">
                                            <option value="" th:text="#{select.merchant}"></option>
                                            <option th:each="m : ${merchants}"
                                                    th:value="${m.id}"
                                                    th:text="${m.name}">
                                            </option>
                                        </select>
                                    </div>
                                    <!-- Mode Edit/View: tampilkan readonly + hidden -->
                                    <div th:if="${mode != 'add'}">
                                        <input type="hidden" th:field="*{merchantId}" />
                                        <input type="text"
                                               class="form-control"
                                               th:value="${product.merchantName}"
                                               readonly />
                                    </div>
                                    <div th:if="${#fields.hasErrors('merchantId')}"
                                         th:errors="*{merchantId}"
                                         class="text-danger small mt-1">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" th:text="#{product.category}"></label>
                                    <!-- Mode Add: pilih merchant -->
                                    <div th:if="${mode == 'add'}">
                                        <select id="categorySelect" class="form-select"
                                                th:field="*{categoryId}"
                                                th:disabled="${mode == 'view'}">
                                            <option value="" th:text="#{select.category}"></option>
                                            <option th:each="c : ${categories}"
                                                    th:value="${c.id}"
                                                    th:text="${c.name}"
                                                    th:data-merchant="${c.merchantId}">
                                            </option>
                                        </select>
                                    </div>
                                    <div th:if="${mode != 'add'}">
                                        <input type="hidden" th:field="*{categoryId}" />
                                        <input type="text"
                                               class="form-control"
                                               th:value="${product.categoryName}"
                                               readonly />
                                    </div>
                                    <div th:if="${#fields.hasErrors('categoryId')}"
                                         th:errors="*{categoryId}"
                                         class="text-danger small mt-1">
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" th:text="#{product.name}"></label>
                                    <input class="form-control"
                                           th:field="*{name}"
                                           th:readonly="${mode == 'view'}" />
                                    <div th:if="${#fields.hasErrors('name')}"
                                         th:errors="*{name}"
                                         class="text-danger small mt-1">
                                    </div>
                                </div>
                            </div>
                            <!-- ================= RIGHT COLUMN ================= -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label" th:text="#{product.costPrice}"></label>
                                    <input class="form-control"
                                           th:field="*{costPrice}"
                                           th:readonly="${mode == 'view'}" />
                                </div>

                                <div class="mb-3">
                                    <label class="form-label" th:text="#{product.sellingPrice}"></label>
                                    <input class="form-control"
                                           th:field="*{sellingPrice}"
                                           th:readonly="${mode == 'view'}" />
                                </div>
                                <div class="mb-3">
                                    <label class="form-label" th:text="#{status}"></label>
                                    <select class="form-select"
                                            th:field="*{status}"
                                            th:disabled="${mode == 'view'}">
                                        <option value="ACTIVE">ACTIVE</option>
                                        <option value="INACTIVE">INACTIVE</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div th:replace="~{fragments/form-actions :: formActions(
                                    ${mode},
                                    '/products/' + ${product.id} + '/edit',
                                    '/products/' + ${product.id} + '/delete',
                                    '/products',
                                    ${role == 'ADMIN' or role == 'MERCHANT_USER'},
                                    ${role == 'ADMIN' or role == 'MERCHANT_USER'}
                            )}"></div>
                </form>
        </div>
    </div>
</section>

</body>
</html>
