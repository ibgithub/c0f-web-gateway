<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_layout}">
<head>
    <title class="fw-semibold" th:text="#{report.sales.title}"></title>
</head>
<body>
<section layout:fragment="content">
    <div class="container pt-1">
        <div th:replace="~{fragments/list-header :: listHeader(
                'report.sales.title',
                '/reports/reports_sales',
                ${pageSize},
                ${keyword},
                ${success}
        )}"></div>

        <!-- Card -->
        <div class="card shadow-sm border-0">
            <div class="card-body rounded-3 pt-2 pb-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="fw-semibold text-secondary" th:text="#{merchant.name}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{outlet.name}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{salesSummary.salesDate}"></th>
                            <th class="fw-semibold text-secondary text-end" th:text="#{salesSummary.totalAmount}"></th>
                            <th class="text-end fw-semibold text-secondary" th:text="#{action}"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="salesSummary : ${salesReportSummaries}">
                            <td th:text="${salesSummary.merchantName}"></td>
                            <td th:text="${salesSummary.outletName}"></td>
                            <td th:text="${salesSummary.salesDate}"></td>
                            <td class="money-cell" th:insert="~{fragments/money :: money(${salesSummary.totalAmount})}"></td>
                            <td class="text-end">
                                <div class="d-inline-flex align-items-center gap-1">
                                    <!-- VIEW -->
                                    <a th:href="'/reports_sales_detail/' + ${salesSummary.outletId} + '/' + ${salesSummary.salesDate}"
                                       class="btn btn-sm btn-outline-secondary btn-table-action"
                                       data-bs-toggle="tooltip"
                                       data-bs-placement="top"
                                       th:title="#{view}">
                                        <i class="fa fa-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div th:replace="~{fragments/list-toolbar :: listToolbar(
                    '/reports_sales',
                    ${currentPage},
                    ${totalPages},
                    ${pageSize},
                    ${totalElements},
                    ${false},
                    '',
                    #{view},
                    ${keyword}
                    )}">
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
