<!doctype html>
<html lang="id" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_layout}">
<head>
    <title class="fw-semibold" th:text="#{report.sales.detail.title}"></title>
</head>
<body>
<section layout:fragment="content">
    <div class="container pt-1">
        <div th:replace="~{fragments/list-header :: listHeader(
                'report.sales.detail.title',
                '/reports/reports_sales_detail/' + ${outletId} + '/' + ${salesDate},
                ${pageSize},
                ${keyword},
                ${success}
        )}"></div>

        <!-- Card -->
        <div class="card shadow-sm border-0">
            <div class="card-body rounded-3 pt-2 pb-3">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr>
                            <th class="fw-semibold text-secondary" th:text="#{salesReport.cashierName}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{salesReport.receiptNo}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{salesReport.createdAt}"></th>
                            <th class="fw-semibold text-secondary" th:text="#{salesReport.paymentMethod}"></th>
                            <!--<th class="fw-semibold text-secondary" th:text="#{salesReport.paymentStatus}"></th>-->
                            <th class="fw-semibold text-secondary" th:text="#{salesReport.status}"></th>
                            <th class="fw-semibold text-secondary text-end" th:text="#{salesReport.totalAmount}"></th>
                            <th class="text-end fw-semibold text-secondary" th:text="#{action}"></th>
                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="salesReport : ${salesReports}">
                            <td th:text="${salesReport.cashierName}"></td>
                            <td th:text="${salesReport.receiptNo}"></td>
                            <td th:insert="~{fragments/datetime :: datetime(${salesReport.createdAt})}"></td>
                            <td th:text="${salesReport.paymentMethod}"></td>
                            <!--<td th:text="${salesReport.paymentStatus}"></td>-->
                            <td th:text="${salesReport.status}"></td>
                            <td class="money-cell" th:insert="~{fragments/money :: money(${salesReport.totalAmount})}"></td>
                            <td class="text-end">
                                <div class="d-inline-flex align-items-center gap-1">
                                    <!-- VIEW -->
                                    <a th:href="'/reports/reports_sales_detail_item/' + ${salesReport.id} "
                                       class="btn btn-sm btn-outline-secondary btn-table-action"
                                       data-bs-toggle="tooltip"
                                       data-bs-placement="top"
                                       th:title="#{view}">
                                        <i class="fa fa-eye"></i>
                                    </a>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <div th:replace="~{fragments/list-toolbar :: listToolbar(
                    '/reports/reports_sales_detail/' + ${outletId} + '/' + ${salesDate},
                    ${currentPage},
                    ${totalPages},
                    ${pageSize},
                    ${totalElements},
                    ${false},
                    '',
                    #{view},
                    ${keyword}
                    )}">
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
