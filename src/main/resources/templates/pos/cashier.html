<!doctype html>
<html lang="id"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_layout}">

<head>
    <title class="fw-semibold" th:text="#{nav.cashier}"></title>
</head>

<body>

<section layout:fragment="content">

    <div class="container-fluid pos-container">
        <div class="row pos-row">

            <!-- LEFT : PRODUCTS -->
            <div class="col-lg-8 product-panel">

                <div class="pos-search mb-3">
                    <input id="productSearch"
                           class="form-control form-control-lg"
                           placeholder="Search product...">
                </div>

                <div class="category-tabs mb-3">

                    <button class="btn btn-sm btn-outline-secondary category-btn active"
                            data-category="all">
                        All
                    </button>

                    <button th:each="c : ${categories}"
                            class="btn btn-sm btn-outline-secondary category-btn"
                            th:data-category="${c.id}"
                            th:text="${c.name}">
                    </button>

                </div>

                <div class="product-grid">

                    <div class="product-card"
                         th:each="p : ${products}"
                         th:data-id="${p.id}"
                         th:data-name="${p.name}"
                         th:data-price="${p.sellingPrice}"
                         th:data-category="${p.categoryId}">

                        <div class="product-name"
                             th:text="${p.name}">
                        </div>

                        <div class="product-price">
                            Rp
                            <span th:text="${#numbers.formatInteger(p.sellingPrice,3,'POINT')}"></span>
                        </div>

                    </div>

                </div>

            </div>

            <!-- RIGHT : CART -->
            <div class="col-lg-4 cart-panel">

                <h5 class="mb-3">Order</h5>

                <div id="cartItems"></div>

                <div class="cart-bottom">
                    <hr>

                    <div class="cart-summary">

                        <div class="d-flex justify-content-between">
                            <span>Subtotal</span>
                            <span id="subtotal">Rp 0</span>
                        </div>

                        <div class="d-flex justify-content-between total">
                            <span>Total</span>
                            <span id="total">Rp 0</span>
                        </div>

                    </div>

                    <button class="btn btn-success btn-pay w-100">
                        Pay
                    </button>

                    <button id="clearCart"
                            class="btn btn-outline-danger btn-cancel w-100">
                        Cancel Order
                    </button>
                </div>
            </div>

        </div>
    </div>

</section>

</body>
</html>
