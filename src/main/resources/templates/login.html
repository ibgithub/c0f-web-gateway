<!doctype html>
<html lang="id" xmlns:th="http://thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base_layout}">
<head>
    <title>Home</title>
</head>
<body>

<section layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5 col-md-7">

                <div class="card login-card shadow border-0">
                    <div class="card-body p-4">

                        <!-- HEADER -->
                        <div class="text-center mb-4">
                            <h2 class="fw-semibold mb-1"
                                th:text="#{login}">
                            </h2>
                            <small class="text-muted" th:text="#{login.subtitle}">
                            </small>
                        </div>

                        <div th:if="${error}"
                             class="alert alert-danger alert-dismissible fade show"
                             role="alert">

                            <span th:if="${error == 'login_failed'}"
                                  th:text="#{login.error.invalid}">
                            </span>

                            <button type="button"
                                    class="btn-close"
                                    data-bs-dismiss="alert">
                            </button>
                        </div>
                        <form th:action="@{/login}" method="post">

                            <!-- USERNAME -->
                            <div class="mb-3">
                                <label for="username" class="form-label"
                                       th:text="#{login.username}">
                                </label>
                                <input type="text"
                                       class="form-control"
                                       id="username"
                                       name="username"
                                       required
                                       autofocus />
                            </div>

                            <!-- PASSWORD -->
                            <div class="mb-4">
                                <label for="password" class="form-label"
                                       th:text="#{login.password}">
                                </label>

                                <div class="input-group">
                                    <input type="password"
                                           class="form-control"
                                           id="password"
                                           name="password"
                                           required />

                                    <button type="button"
                                            class="btn btn-outline-secondary"
                                            id="togglePassword">
                                        <i class="fa fa-eye"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- ACTION AREA -->
                            <div class="login-action border-top pt-3 mt-3 d-flex justify-content-between align-items-center">

                                <button type="submit"
                                        class="btn btn-premium px-4">
                                    <span th:text="#{login.submit}"></span>
                                </button>

                                <a href="#"
                                   class="link-premium small">
                                    <span th:text="#{login.forgot.password}"></span>
                                </a>

                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>

</body>
</html>
